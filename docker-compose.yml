# docker-compose.yml
#
# Drop this on a Proxmox VM or LXC container (with Docker installed) and run:
#   docker compose up -d --build
#
# Then browse to http://<host-ip>:8080

services:
  promptpilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: promptpilot:latest
    container_name: promptpilot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL